<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round">
  <!-- Desk Mat Body -->
  <rect x="40" y="40" width="720" height="340" rx="20" ry="20" stroke-width="6" fill="white"/>

  <!-- Stitched edge detail (inner border) -->
  <rect x="52" y="52" width="696" height="316" rx="14" ry="14" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.4"/>

  <!-- Keyboard -->
  <g transform="translate(160, 130)">
    <!-- Keyboard body -->
    <rect x="0" y="0" width="320" height="110" rx="8" ry="8" stroke-width="3.5" fill="white"/>

    <!-- Function row (small keys) -->
    <rect x="12" y="10" width="14" height="10" rx="2" stroke-width="1.5"/>
    <rect x="30" y="10" width="14" height="10" rx="2" stroke-width="1.5"/>
    <rect x="48" y="10" width="14" height="10" rx="2" stroke-width="1.5"/>
    <rect x="66" y="10" width="14" height="10" rx="2" stroke-width="1.5"/>
    <rect x="86" y="10" width="14" height="10" rx="2" stroke-width="1.5"/>
    <rect x="104" y="10" width="14" height="10" rx="2" stroke-width="1.5"/>
    <rect x="122" y="10" width="14" height="10" rx="2" stroke-width="1.5"/>
    <rect x="140" y="10" width="14" height="10" rx="2" stroke-width="1.5"/>
    <rect x="160" y="10" width="14" height="10" rx="2" stroke-width="1.5"/>
    <rect x="178" y="10" width="14" height="10" rx="2" stroke-width="1.5"/>
    <rect x="196" y="10" width="14" height="10" rx="2" stroke-width="1.5"/>
    <rect x="214" y="10" width="14" height="10" rx="2" stroke-width="1.5"/>
    <rect x="232" y="10" width="14" height="10" rx="2" stroke-width="1.5"/>
    <rect x="254" y="10" width="14" height="10" rx="2" stroke-width="1.5"/>
    <rect x="272" y="10" width="14" height="10" rx="2" stroke-width="1.5"/>
    <rect x="290" y="10" width="18" height="10" rx="2" stroke-width="1.5"/>

    <!-- Number row -->
    <rect x="12" y="24" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="32" y="24" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="52" y="24" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="72" y="24" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="92" y="24" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="112" y="24" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="132" y="24" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="152" y="24" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="172" y="24" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="192" y="24" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="212" y="24" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="232" y="24" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="252" y="24" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="272" y="24" width="36" height="14" rx="2" stroke-width="1.5"/>

    <!-- QWERTY row -->
    <rect x="12" y="42" width="22" height="14" rx="2" stroke-width="1.5"/>
    <rect x="38" y="42" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="58" y="42" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="78" y="42" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="98" y="42" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="118" y="42" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="138" y="42" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="158" y="42" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="178" y="42" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="198" y="42" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="218" y="42" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="238" y="42" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="258" y="42" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="278" y="42" width="30" height="14" rx="2" stroke-width="1.5"/>

    <!-- Home row -->
    <rect x="12" y="60" width="26" height="14" rx="2" stroke-width="1.5"/>
    <rect x="42" y="60" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="62" y="60" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="82" y="60" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="102" y="60" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="122" y="60" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="142" y="60" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="162" y="60" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="182" y="60" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="202" y="60" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="222" y="60" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="242" y="60" width="66" height="14" rx="2" stroke-width="1.5"/>

    <!-- Bottom row (shift, space, etc) -->
    <rect x="12" y="78" width="34" height="14" rx="2" stroke-width="1.5"/>
    <rect x="50" y="78" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="70" y="78" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="90" y="78" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="110" y="78" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="130" y="78" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="150" y="78" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="170" y="78" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="190" y="78" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="210" y="78" width="16" height="14" rx="2" stroke-width="1.5"/>
    <rect x="230" y="78" width="78" height="14" rx="2" stroke-width="1.5"/>

    <!-- Spacebar row -->
    <rect x="12" y="96" width="22" height="10" rx="2" stroke-width="1.5"/>
    <rect x="38" y="96" width="22" height="10" rx="2" stroke-width="1.5"/>
    <rect x="64" y="96" width="22" height="10" rx="2" stroke-width="1.5"/>
    <rect x="90" y="96" width="120" height="10" rx="2" stroke-width="1.5"/>
    <rect x="214" y="96" width="22" height="10" rx="2" stroke-width="1.5"/>
    <rect x="240" y="96" width="22" height="10" rx="2" stroke-width="1.5"/>
    <rect x="266" y="96" width="14" height="10" rx="2" stroke-width="1.5"/>
    <rect x="284" y="96" width="14" height="10" rx="2" stroke-width="1.5"/>
  </g>

  <!-- Mouse -->
  <g transform="translate(555, 150)">
    <!-- Mouse body -->
    <rect x="0" y="0" width="56" height="90" rx="28" ry="28" stroke-width="3.5" fill="white"/>
    <!-- Center divider line -->
    <line x1="28" y1="4" x2="28" y2="36" stroke-width="1.5"/>
    <!-- Scroll wheel -->
    <rect x="23" y="16" width="10" height="16" rx="5" stroke-width="1.8"/>
    <!-- Left click zone -->
    <path d="M 4 36 Q 4 3 28 3" stroke-width="1" opacity="0.3"/>
    <!-- Right click zone -->
    <path d="M 52 36 Q 52 3 28 3" stroke-width="1" opacity="0.3"/>
    <!-- Mouse cord hint -->
    <path d="M 28 0 Q 28 -12 22 -20" stroke-width="1.5" opacity="0.5"/>
  </g>
</svg>