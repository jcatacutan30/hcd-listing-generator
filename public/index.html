<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCD Amazon Listing Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(to bottom right, #f8fafc, #e2e8f0);
            min-height: 100vh;
            padding: 24px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 32px; margin-bottom: 24px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .title { font-size: 28px; font-weight: bold; color: #1e293b; margin-bottom: 4px; }
        .subtitle { color: #64748b; font-size: 14px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        @media (max-width: 1024px) { .grid { grid-template-columns: 1fr; } }
        .input-group { margin-bottom: 16px; }
        .label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select, textarea { 
            width: 100%; 
            padding: 10px 12px; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            font-size: 14px;
            font-family: inherit;
        }
        textarea { resize: vertical; }
        .btn { 
            padding: 14px 24px; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: linear-gradient(to right, #2563eb, #4f46e5); color: white; }
        .btn-primary:hover:not(:disabled) { transform: translateY(-1px); }
        .btn-secondary { background: #f1f5f9; color: #475569; }
        .section { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .section-title { font-weight: 600; font-size: 13px; margin-bottom: 12px; }
        .result-box { background: #f0fdf4; border: 2px solid #86efac; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .result-title { font-weight: 600; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .result-content { font-size: 14px; color: #374151; line-height: 1.6; }
        .char-count { font-size: 11px; color: #64748b; margin-top: 4px; }
        .empty-state { text-align: center; padding: 80px 20px; color: #94a3b8; border: 2px dashed #cbd5e1; border-radius: 8px; }
        .compliance-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fed7aa; color: #9a3412; }
        .copy-btn { background: #3b82f6; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .bullet-list { list-style: none; padding: 0; }
        .bullet-list li { padding: 8px 0; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
        .hidden { display: none; }
        .w-full { width: 100%; }
        .status-message { padding: 12px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
        .status-success { background: #d1fae5; color: #065f46; }
        .status-error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div>
                    <h1 class="title">HCD Amazon Listing Generator</h1>
                    <p class="subtitle">Backend API + Claude Sonnet 4</p>
                </div>
                <button class="btn btn-secondary" onclick="loadExample()">📋 Load Example</button>
            </div>

            <div id="status-message" style="display: none;"></div>

            <div class="grid">
                <div>
                    <div class="section">
                        <div class="section-title">📊 Import CSV</div>
                        <input type="file" accept=".csv" onchange="handleCSVUpload(event)">
                    </div>

                    <div class="input-group">
                        <label class="label">Keywords</label>
                        <textarea id="keywords" rows="6"></textarea>
                    </div>

                    <select id="category" style="margin-bottom: 16px;">
                        <option>Phone Cases</option>
                        <option>Laptop Cases</option>
                        <option>Audio Cases</option>
                        <option>Tablet Cases</option>
                        <option>Room Accessories</option>
                        <option>Holders & Clips</option>
                        <option>Portable Power</option>
                        <option>Gaming/Office Accessory</option>
                    </select>

                    <div class="section">
                        <div class="section-title">Product Info</div>
                        <div style="display: grid; gap: 12px;">
                            <input id="brandName" placeholder="Brand Name (e.g., Manchester City FC)">
                            <input id="designName" placeholder="Design Name (e.g., Home Kit, Logo)">
                            <input id="lineupName" placeholder="Lineup Name (e.g., 2024/25 Season)">
                            <input id="productName" placeholder="Product Name (e.g., Shockproof Case)">
                            <input id="deviceName" placeholder="Device Name (e.g., iPhone 16 Pro Max)">
                            <input id="mainMaterial" placeholder="Main Material (e.g., TPU/PC)">
                        </div>
                    </div>

                    <textarea id="keyFeatures" rows="3" placeholder="Features" style="margin-bottom: 16px;"></textarea>

                    <div class="section">
                        <div class="section-title">🔍 Competitor Analysis (Optional)</div>
                        <div style="display: grid; gap: 12px;">
                            <input id="competitor1-asin" placeholder="Competitor 1 ASIN">
                            <textarea id="competitor1-title" rows="2" placeholder="Competitor 1 Title"></textarea>
                            <textarea id="competitor1-bullets" rows="3" placeholder="Competitor 1 Bullets"></textarea>

                            <input id="competitor2-asin" placeholder="Competitor 2 ASIN">
                            <textarea id="competitor2-title" rows="2" placeholder="Competitor 2 Title"></textarea>
                            <textarea id="competitor2-bullets" rows="3" placeholder="Competitor 2 Bullets"></textarea>

                            <input id="competitor3-asin" placeholder="Competitor 3 ASIN">
                            <textarea id="competitor3-title" rows="2" placeholder="Competitor 3 Title"></textarea>
                            <textarea id="competitor3-bullets" rows="3" placeholder="Competitor 3 Bullets"></textarea>
                        </div>
                    </div>

                    <button class="btn btn-primary w-full" onclick="generateListing()" id="generateBtn">
                        ✨ Generate
                    </button>
                </div>

                <div>
                    <div id="output-area" class="empty-state">
                        <div style="font-size: 48px;">✨</div>
                        <p><strong>Ready</strong></p>
                    </div>

                    <div id="results" class="hidden">
                        <div style="text-align: center; margin-bottom: 16px;">
                            <span id="compliance-badge" class="compliance-badge badge-success">✓ Compliant</span>
                            <span id="compliance-score" style="font-weight: bold; margin-left: 8px;"></span>
                        </div>

                        <div class="result-box">
                            <div class="result-title">
                                <span>📝 Title</span>
                                <button class="copy-btn" onclick="copy('title')">Copy</button>
                            </div>
                            <div id="title-output" class="result-content"></div>
                            <div id="title-count" class="char-count"></div>
                        </div>

                        <div class="result-box" style="background: #eff6ff; border-color: #93c5fd;">
                            <div class="result-title">
                                <span>📌 Bullets</span>
                                <button class="copy-btn" onclick="copy('bullets')">Copy</button>
                            </div>
                            <ul id="bullets-output" class="bullet-list"></ul>
                        </div>

                        <div class="result-box" style="background: #fef3c7; border-color: #fcd34d;">
                            <div class="result-title">
                                <span>📄 Product Description (HCD Format)</span>
                                <button class="copy-btn" onclick="copy('description')">Copy</button>
                            </div>
                            <div id="description-output" class="result-content" style="white-space: pre-wrap;"></div>
                        </div>

                        <div class="result-box" style="background: #fce7f3; border-color: #f9a8d4;">
                            <div class="result-title">
                                <span>🔑 Backend Keywords</span>
                                <button class="copy-btn" onclick="copy('backend')">Copy</button>
                            </div>
                            <div id="backend-output" class="result-content"></div>
                        </div>
                    </div>

                    <div id="chat-section" class="hidden" style="margin-top: 24px;">
                        <div class="card" style="padding: 24px;">
                            <div class="section-title" style="font-size: 16px; margin-bottom: 16px;">💬 Revise with Claude</div>
                            <div id="chat-history" style="max-height: 400px; overflow-y: auto; margin-bottom: 16px; padding: 16px; background: #f8fafc; border-radius: 8px; min-height: 200px;"></div>
                            <div style="display: flex; gap: 8px;">
                                <textarea id="chat-input" rows="3" placeholder="Ask for revisions, rewrites, or improvements... (Ctrl+Enter to send)" style="flex: 1;" onkeydown="if(event.ctrlKey && event.key === 'Enter') sendChatMessage();"></textarea>
                                <button class="btn btn-primary" onclick="sendChatMessage()" id="chatBtn" style="align-self: flex-end;">Send</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let data = {};
        let chatHistory = [];

        function showStatus(msg, type) {
            const el = document.getElementById('status-message');
            el.className = `status-message status-${type}`;
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function loadExample() {
            document.getElementById('keywords').value = `iphone 16 case, 450000\nmagsafe case, 165000\niphone case protective, 89000`;
            document.getElementById('brandName').value = 'Manchester City FC';
            document.getElementById('designName').value = 'Home Kit 2024/25';
            document.getElementById('lineupName').value = 'Football Club Collection';
            document.getElementById('productName').value = 'Shockproof Case';
            document.getElementById('deviceName').value = 'iPhone 16 Pro Max';
            document.getElementById('mainMaterial').value = 'TPU/PC';
            document.getElementById('keyFeatures').value = 'MagSafe, Military-Grade Protection';

            // Example competitor data
            document.getElementById('competitor1-asin').value = 'B0ABC123XY';
            document.getElementById('competitor1-title').value = 'Generic Brand iPhone 16 Pro Max Case with MagSafe';
            document.getElementById('competitor1-bullets').value = '• Protective case for iPhone\n• MagSafe compatible\n• Durable materials';

            showStatus('✅ Example loaded', 'success');
        }

        function handleCSVUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const lines = e.target.result.split('\n');
                const kw = lines.slice(1, 100).map(l => {
                    const p = l.split(',');
                    return p.length >= 2 ? `${p[0].trim()}, ${p[1].trim()}` : null;
                }).filter(Boolean).join('\n');
                document.getElementById('keywords').value = kw;
                showStatus(`✓ ${lines.length - 1} keywords`, 'success');
            };
            reader.readAsText(file);
        }

        async function generateListing() {
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Generating...';

            try {
                const keywords = document.getElementById('keywords').value.split('\n').map(l => {
                    const p = l.split(',');
                    return { keyword: p[0]?.trim(), volume: p[1]?.trim() };
                }).filter(k => k.keyword);

                // Collect competitor data
                const competitors = [];
                for (let i = 1; i <= 3; i++) {
                    const asin = document.getElementById(`competitor${i}-asin`)?.value;
                    const title = document.getElementById(`competitor${i}-title`)?.value;
                    const bullets = document.getElementById(`competitor${i}-bullets`)?.value;
                    if (title) {
                        competitors.push({ asin, title, bullets });
                    }
                }

                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        keywords,
                        productInfo: {
                            category: document.getElementById('category').value,
                            brandName: document.getElementById('brandName').value,
                            designName: document.getElementById('designName').value,
                            lineupName: document.getElementById('lineupName').value,
                            productName: document.getElementById('productName').value,
                            deviceName: document.getElementById('deviceName').value,
                            mainMaterial: document.getElementById('mainMaterial').value,
                            keyFeatures: document.getElementById('keyFeatures').value
                        },
                        competitors
                    })
                });

                const result = await response.json();
                if (!result.success) throw new Error(result.error);

                data = result.data;
                chatHistory = []; // Reset chat history

                document.getElementById('output-area').classList.add('hidden');
                document.getElementById('results').classList.remove('hidden');
                document.getElementById('chat-section').classList.remove('hidden');

                document.getElementById('title-output').textContent = data.title;
                document.getElementById('title-count').textContent = `${data.title.length}/200`;

                const list = document.getElementById('bullets-output');
                list.innerHTML = '';
                data.bullets.forEach(b => {
                    const li = document.createElement('li');
                    li.textContent = b.replace(/\*\*/g, '');
                    list.appendChild(li);
                });

                document.getElementById('description-output').textContent = data.hcdFormat || 'No description generated';
                document.getElementById('backend-output').textContent = data.backendKeywords || 'No backend keywords';

                document.getElementById('compliance-score').textContent = `${data.validation.score}/100`;
                showStatus('✅ Generated!', 'success');

            } catch (error) {
                showStatus('❌ ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '✨ Generate';
            }
        }

        function copy(type) {
            let text = '';
            if (type === 'title') text = data.title;
            else if (type === 'bullets') text = data.bullets.map(b => b.replace(/\*\*/g, '')).join('\n');
            else if (type === 'description') text = data.hcdFormat;
            else if (type === 'backend') text = data.backendKeywords;

            navigator.clipboard.writeText(text);
            showStatus('✅ Copied!', 'success');
        }

        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            const btn = document.getElementById('chatBtn');
            btn.disabled = true;
            btn.textContent = '⏳';

            // Add user message to chat
            addChatMessage('user', message);
            input.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message,
                        currentListing: data,
                        history: chatHistory
                    })
                });

                // Check if response is ok
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Server error: ${response.status} - ${errorText.substring(0, 100)}`);
                }

                const result = await response.json();
                if (!result.success) throw new Error(result.error);

                // Add assistant message
                addChatMessage('assistant', result.message);

                // Update listing if changes were made
                if (result.updatedListing) {
                    data = { ...data, ...result.updatedListing };
                    updateDisplayedListing();
                }

            } catch (error) {
                console.error('Chat error:', error);
                addChatMessage('error', error.message || 'Failed to send message');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send';
            }
        }

        function addChatMessage(role, content) {
            const chatHistoryEl = document.getElementById('chat-history');
            const msg = document.createElement('div');
            msg.style.cssText = `
                margin-bottom: 12px;
                padding: 12px;
                border-radius: 8px;
                ${role === 'user' ? 'background: #dbeafe; text-align: right;' :
                  role === 'error' ? 'background: #fee2e2; color: #991b1b;' :
                  'background: #f0fdf4;'}
            `;
            msg.innerHTML = `<strong>${role === 'user' ? 'You' : role === 'error' ? 'Error' : 'Claude'}:</strong><br>${content.replace(/\n/g, '<br>')}`;
            chatHistoryEl.appendChild(msg);
            chatHistoryEl.scrollTop = chatHistoryEl.scrollHeight;

            // Add to history array for API calls
            if (role !== 'error') {
                chatHistory.push({ role, content });
            }
        }

        function updateDisplayedListing() {
            document.getElementById('title-output').textContent = data.title;
            document.getElementById('title-count').textContent = `${data.title.length}/200`;

            const list = document.getElementById('bullets-output');
            list.innerHTML = '';
            data.bullets.forEach(b => {
                const li = document.createElement('li');
                li.textContent = b.replace(/\*\*/g, '');
                list.appendChild(li);
            });

            if (data.hcdFormat) {
                document.getElementById('description-output').textContent = data.hcdFormat;
            }
        }
    </script>
</body>
</html>
