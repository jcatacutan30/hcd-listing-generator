<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCD Listing Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #d4d4d4;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 400px 1fr;
            height: 100vh;
            gap: 0;
        }

        /* Left Panel - Inputs */
        .left-panel {
            background: #1a1f26;
            border-right: 1px solid #2d3748;
            overflow-y: auto;
            padding: 24px;
        }

        .header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #2d3748;
        }

        .title {
            font-size: 16px;
            font-weight: 600;
            color: #6ee7b7;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 12px;
            color: #9ca3af;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: #a0aec0;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px 12px;
            background: #0f1419;
            border: 1px solid #2d3748;
            border-radius: 6px;
            color: #d4d4d4;
            font-size: 13px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #6ee7b7;
        }

        textarea {
            resize: vertical;
            font-size: 12px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #6ee7b7;
            color: #0f1419;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5dd4a6;
        }

        .btn-secondary {
            background: #2d3748;
            color: #d4d4d4;
            margin-bottom: 16px;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #374151;
        }

        .section {
            margin-bottom: 16px;
            padding: 12px;
            background: #0f1419;
            border: 1px solid #2d3748;
            border-radius: 6px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: #a0aec0;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .compact-inputs {
            display: grid;
            gap: 8px;
        }

        .compact-inputs input {
            padding: 6px 10px;
            font-size: 12px;
        }

        /* Right Panel - Results */
        .right-panel {
            display: flex;
            flex-direction: column;
            background: #0f1419;
            overflow: hidden;
        }

        .results-header {
            padding: 16px 24px;
            border-bottom: 1px solid #2d3748;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .results-header h2 {
            font-size: 14px;
            font-weight: 600;
            color: #a0aec0;
        }

        .compliance-badge {
            font-size: 11px;
            padding: 4px 10px;
            background: #065f46;
            color: #6ee7b7;
            border-radius: 12px;
        }

        .results-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .result-block {
            margin-bottom: 24px;
            padding: 16px;
            background: #1a1f26;
            border: 1px solid #2d3748;
            border-radius: 8px;
        }

        .result-block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .result-block-title {
            font-size: 12px;
            font-weight: 600;
            color: #6ee7b7;
            text-transform: uppercase;
        }

        .copy-btn {
            background: #2d3748;
            color: #d4d4d4;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: #374151;
        }

        .result-text {
            color: #d4d4d4;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .char-count {
            font-size: 10px;
            color: #9ca3af;
            margin-top: 8px;
        }

        .bullet-list {
            list-style: none;
            padding: 0;
        }

        .bullet-list li {
            padding: 8px 0;
            border-bottom: 1px solid #2d3748;
            font-size: 13px;
            color: #d4d4d4;
        }

        .bullet-list li:last-child {
            border-bottom: none;
        }

        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: #6b7280;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* Chat Section */
        .chat-section {
            border-top: 1px solid #2d3748;
            display: flex;
            flex-direction: column;
            max-height: 300px;
        }

        .chat-header {
            padding: 12px 16px;
            background: #1a1f26;
            font-size: 12px;
            font-weight: 600;
            color: #6ee7b7;
            text-transform: uppercase;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #0f1419;
        }

        .chat-message {
            margin-bottom: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.5;
        }

        .chat-message.user {
            background: #1a1f26;
            text-align: right;
            margin-left: 40px;
            border-left: 2px solid #6ee7b7;
        }

        .chat-message.assistant {
            background: #1a1f26;
            margin-right: 40px;
            border-left: 2px solid #9ca3af;
        }

        .chat-message.error {
            background: #7f1d1d;
            color: #fca5a5;
        }

        .chat-message strong {
            display: block;
            margin-bottom: 4px;
            font-size: 10px;
            opacity: 0.6;
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
            padding: 16px;
            background: #1a1f26;
            border-top: 1px solid #2d3748;
        }

        .chat-input-area textarea {
            flex: 1;
            min-height: 40px;
            max-height: 80px;
        }

        .chat-input-area button {
            width: 80px;
            padding: 10px;
        }

        .status-message {
            padding: 10px 16px;
            margin-bottom: 16px;
            border-radius: 6px;
            font-size: 12px;
            background: #065f46;
            color: #6ee7b7;
            border-left: 3px solid #6ee7b7;
        }

        .status-message.error {
            background: #7f1d1d;
            color: #fca5a5;
            border-left-color: #fca5a5;
        }

        .hidden {
            display: none;
        }

        /* Image Preview */
        #imagePreview img {
            max-width: 100%;
            max-height: 150px;
            border-radius: 6px;
            margin-top: 8px;
            border: 1px solid #2d3748;
        }

        /* Loading Animation */
        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #2d3748;
            border-top-color: #6ee7b7;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f1419;
        }

        ::-webkit-scrollbar-thumb {
            background: #2d3748;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #374151;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left Panel: Inputs -->
        <div class="left-panel">
            <div class="header">
                <h1 class="title">HCD Listing Generator</h1>
                <p class="subtitle">Claude Sonnet 4.5</p>
            </div>

            <button class="btn btn-secondary" onclick="loadExample()">Load Example</button>

            <div class="section">
                <div class="section-title">CSV Upload</div>
                <input type="file" accept=".csv" onchange="handleCSVUpload(event)">
            </div>

            <div class="input-group">
                <label class="label">Keywords</label>
                <textarea id="keywords" rows="4" placeholder="keyword, volume"></textarea>
            </div>

            <div class="input-group">
                <label class="label">Category</label>
                <select id="category">
                    <option>Phone Cases</option>
                    <option>Laptop Cases</option>
                    <option>Audio Cases</option>
                    <option>Tablet Cases</option>
                    <option>Room Accessories</option>
                    <option>Holders & Clips</option>
                    <option>Portable Power</option>
                    <option>Gaming/Office Accessory</option>
                </select>
            </div>

            <div class="section">
                <div class="section-title">Product Info</div>
                <div class="compact-inputs">
                    <input id="brandName" placeholder="Brand Name">
                    <input id="designName" placeholder="Design Name">
                    <input id="lineupName" placeholder="Lineup Name">
                    <input id="productName" placeholder="Product Name">
                    <input id="deviceName" placeholder="Device Name">
                    <input id="mainMaterial" placeholder="Material">
                    <input id="countryOfManufacture" placeholder="Country (e.g., USA, UK, China)">
                </div>
            </div>

            <div class="input-group">
                <label class="label">Key Features</label>
                <textarea id="keyFeatures" rows="2" placeholder="MagSafe, Protection, etc."></textarea>
            </div>

            <div class="section">
                <div class="section-title">Product Image (Optional)</div>
                <input type="file" id="productImage" accept="image/*" onchange="handleImageUpload(event)">
                <div id="imagePreview" style="margin-top: 8px;"></div>
            </div>

            <div class="section">
                <div class="section-title">Competitor Analysis</div>
                <div class="compact-inputs">
                    <textarea id="competitor1-title" rows="2" placeholder="Competitor 1 Title"></textarea>
                    <textarea id="competitor1-bullets" rows="2" placeholder="Competitor 1 Bullets"></textarea>
                    <textarea id="competitor2-title" rows="2" placeholder="Competitor 2 Title"></textarea>
                    <textarea id="competitor2-bullets" rows="2" placeholder="Competitor 2 Bullets"></textarea>
                    <textarea id="competitor3-title" rows="2" placeholder="Competitor 3 Title"></textarea>
                    <textarea id="competitor3-bullets" rows="2" placeholder="Competitor 3 Bullets"></textarea>
                </div>
            </div>

            <button class="btn btn-primary" onclick="generateListing()" id="generateBtn">Generate</button>
        </div>

        <!-- Right Panel: Results -->
        <div class="right-panel">
            <div class="results-header">
                <h2>RESULTS</h2>
                <span id="compliance-badge" class="compliance-badge hidden">✓ Compliant</span>
            </div>

            <div class="results-content" id="results-content">
                <div id="empty-state" class="empty-state">
                    <div class="empty-state-icon">✨</div>
                    <p>Generate your first listing</p>
                </div>

                <div id="results-area" class="hidden">
                    <div id="status-message" style="display: none;"></div>

                    <div class="result-block">
                        <div class="result-block-header">
                            <span class="result-block-title">Title</span>
                            <button class="copy-btn" onclick="copy('title')">Copy</button>
                        </div>
                        <div id="title-output" class="result-text"></div>
                        <div id="title-count" class="char-count"></div>
                    </div>

                    <div class="result-block">
                        <div class="result-block-header">
                            <span class="result-block-title">Bullets</span>
                            <button class="copy-btn" onclick="copy('bullets')">Copy</button>
                        </div>
                        <ul id="bullets-output" class="bullet-list"></ul>
                    </div>

                    <div class="result-block">
                        <div class="result-block-header">
                            <span class="result-block-title">Description</span>
                            <button class="copy-btn" onclick="copy('description')">Copy</button>
                        </div>
                        <div id="description-output" class="result-text"></div>
                    </div>

                    <div class="result-block">
                        <div class="result-block-header">
                            <span class="result-block-title">Backend Keywords</span>
                            <button class="copy-btn" onclick="copy('backend')">Copy</button>
                        </div>
                        <div id="backend-output" class="result-text"></div>
                    </div>
                </div>
            </div>

            <div id="chat-section" class="chat-section hidden">
                <div class="chat-header">Revise with Claude</div>
                <div id="chat-messages" class="chat-messages"></div>
                <div class="chat-input-area">
                    <textarea id="chat-input" placeholder="Ask for revisions..." onkeydown="if(event.ctrlKey && event.key === 'Enter') sendChatMessage();"></textarea>
                    <button class="btn btn-primary" onclick="sendChatMessage()" id="chatBtn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let data = {};
        let chatHistory = [];
        let productImageBase64 = null;

        function showStatus(msg, type) {
            const el = document.getElementById('status-message');
            el.className = `status-message ${type === 'error' ? 'error' : ''}`;
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                productImageBase64 = e.target.result;
                const preview = document.getElementById('imagePreview');
                preview.innerHTML = `<img src="${e.target.result}" alt="Product preview">`;
                showStatus('Image uploaded', 'success');
            };
            reader.readAsDataURL(file);
        }

        function loadExample() {
            document.getElementById('keywords').value = `iphone 16 case, 450000\nmagsafe case, 165000`;
            document.getElementById('brandName').value = 'Manchester City FC';
            document.getElementById('designName').value = 'Home Kit 2024/25';
            document.getElementById('lineupName').value = 'Football Club Collection';
            document.getElementById('productName').value = 'Shockproof Case';
            document.getElementById('deviceName').value = 'iPhone 16 Pro Max';
            document.getElementById('mainMaterial').value = 'TPU/PC';
            document.getElementById('countryOfManufacture').value = 'UK';
            document.getElementById('keyFeatures').value = 'MagSafe, Military-Grade Protection';
            document.getElementById('competitor1-title').value = 'Generic Brand iPhone 16 Pro Max Case';
            document.getElementById('competitor1-bullets').value = '• Protective\n• MagSafe compatible';
            showStatus('Example loaded', 'success');
        }

        function handleCSVUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const lines = e.target.result.split('\n');
                const kw = lines.slice(1, 100).map(l => {
                    const p = l.split(',');
                    return p.length >= 2 ? `${p[0].trim()}, ${p[1].trim()}` : null;
                }).filter(Boolean).join('\n');
                document.getElementById('keywords').value = kw;
                showStatus(`${lines.length - 1} keywords imported`, 'success');
            };
            reader.readAsText(file);
        }

        async function generateListing() {
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.innerHTML = 'Generating<span class="loading-spinner"></span>';

            try {
                const keywords = document.getElementById('keywords').value.split('\n').map(l => {
                    const p = l.split(',');
                    return { keyword: p[0]?.trim(), volume: p[1]?.trim() };
                }).filter(k => k.keyword);

                const competitors = [];
                for (let i = 1; i <= 3; i++) {
                    const title = document.getElementById(`competitor${i}-title`)?.value;
                    const bullets = document.getElementById(`competitor${i}-bullets`)?.value;
                    if (title) competitors.push({ title, bullets });
                }

                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        keywords,
                        productInfo: {
                            category: document.getElementById('category').value,
                            brandName: document.getElementById('brandName').value,
                            designName: document.getElementById('designName').value,
                            lineupName: document.getElementById('lineupName').value,
                            productName: document.getElementById('productName').value,
                            deviceName: document.getElementById('deviceName').value,
                            mainMaterial: document.getElementById('mainMaterial').value,
                            countryOfManufacture: document.getElementById('countryOfManufacture').value,
                            keyFeatures: document.getElementById('keyFeatures').value
                        },
                        competitors,
                        productImage: productImageBase64
                    })
                });

                const result = await response.json();
                if (!result.success) throw new Error(result.error);

                data = result.data;
                chatHistory = [];

                document.getElementById('empty-state').classList.add('hidden');
                document.getElementById('results-area').classList.remove('hidden');
                document.getElementById('chat-section').classList.remove('hidden');
                document.getElementById('compliance-badge').classList.remove('hidden');

                updateDisplayedListing();
                showStatus('Generated successfully', 'success');

            } catch (error) {
                showStatus(error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Generate';
            }
        }

        function updateDisplayedListing() {
            document.getElementById('title-output').textContent = data.title || '';
            document.getElementById('title-count').textContent = data.title ? `${data.title.length}/200` : '';

            const list = document.getElementById('bullets-output');
            list.innerHTML = '';
            if (data.bullets) {
                data.bullets.forEach(b => {
                    const li = document.createElement('li');
                    li.textContent = b.replace(/\*\*/g, '');
                    list.appendChild(li);
                });
            }

            document.getElementById('description-output').textContent = data.hcdFormat || '';
            document.getElementById('backend-output').textContent = data.backendKeywords || '';
        }

        function copy(type) {
            let text = '';
            if (type === 'title') text = data.title;
            else if (type === 'bullets') text = data.bullets.map(b => b.replace(/\*\*/g, '')).join('\n');
            else if (type === 'description') text = data.hcdFormat;
            else if (type === 'backend') text = data.backendKeywords;

            navigator.clipboard.writeText(text);
            showStatus('Copied to clipboard', 'success');
        }

        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            const btn = document.getElementById('chatBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span>';

            addChatMessage('user', message);
            input.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message,
                        currentListing: data,
                        history: chatHistory
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Server error: ${response.status}`);
                }

                const result = await response.json();
                if (!result.success) throw new Error(result.error);

                addChatMessage('assistant', result.message);

                // Auto-update listing if changes detected
                if (result.updatedListing) {
                    data = { ...data, ...result.updatedListing };
                    updateDisplayedListing();
                    showStatus('Listing updated', 'success');
                }

            } catch (error) {
                console.error('Chat error:', error);
                addChatMessage('error', error.message || 'Failed to send message');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send';
            }
        }

        function addChatMessage(role, content) {
            const messagesEl = document.getElementById('chat-messages');
            const msg = document.createElement('div');
            msg.className = `chat-message ${role}`;
            msg.innerHTML = `<strong>${role === 'user' ? 'You' : role === 'error' ? 'Error' : 'Claude'}:</strong>${content.replace(/\n/g, '<br>')}`;
            messagesEl.appendChild(msg);
            messagesEl.scrollTop = messagesEl.scrollHeight;

            if (role !== 'error') {
                chatHistory.push({ role, content });
            }
        }
    </script>
</body>
</html>
